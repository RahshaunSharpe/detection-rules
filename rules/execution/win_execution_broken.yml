title: First Rule PowerShell Command Execution
id: 8fa7eed6-c74f-4c40-9695-60aa4cf05c68
status: experimental
description: |
    Detects PowerShell launched with an encoded command, frequently used by
    malware droppers and offensive frameworks to obfuscate payloads.
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://attack.mitre.org/techniques/T1027/
author: SDOGEneral
date: 2026-07-04
modified: 2026-07-04
tags:
    - attack.execution
    - attack.defense-evasion
    - attack.t1059.001
    - attack.t1027
logsource:
    product: windows
    category: process_creation
detection:
    selection_img:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_enc:
        CommandLine|contains:
            - ' -enc '
            - ' -EncodedCommand '
            - ' -ec '
            - ' -e '
    condition: selection_img and selection_encs    
level: medium
