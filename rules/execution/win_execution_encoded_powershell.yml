title: Encoded PowerShell Command Execution
id: c4e9f0a2-6b8d-4f1c-8a3e-9d7b2c5f4e60
status: experimental
description: |
    Detects PowerShell launched with an encoded command, frequently used by
    malware droppers and offensive frameworks to obfuscate payloads.
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://attack.mitre.org/techniques/T1027/
author: SDOGEneral
date: 2026-07-04
modified: 2026-07-04
tags:
    - attack.execution
    - attack.defense-evasion
    - attack.t1059.001
    - attack.t1027
logsource:
    product: windows
    category: process_creation
detection:
    selection_img:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_enc:
        CommandLine|contains:
            - ' -enc '
            - ' -EncodedCommand '
            - ' -ec '
            - ' -e '
    condition: selection_img and selection_enc
falsepositives:
    - Some enterprise management tools (SCCM, Ansible win modules) use encoded
      commands legitimately; tune with filters/ per environment
level: medium
