title: LSASS Memory Dump Via Procdump
id: 8b2d4c7e-1a3f-4b6d-9e8c-2f5a7b9d0c31
status: experimental
description: |
    Detects use of Sysinternals procdump to dump LSASS process memory,
    commonly used to extract credentials.
references:
    - https://attack.mitre.org/techniques/T1003/001/
author: SDOGEneral
date: 2026-07-04
modified: 2026-07-04
tags:
    - attack.credential-access
    - attack.t1003.001
logsource:
    product: windows
    category: process_creation
detection:
    selection_img:
        - Image|endswith:
              - '\procdump.exe'
              - '\procdump64.exe'
        - OriginalFileName: 'procdump'
    selection_args:
        CommandLine|contains:
            - ' -ma '
            - ' -mm '
    selection_target:
        CommandLine|contains: 'lsass'
    condition: selection_img and selection_args and selection_target
falsepositives:
    - Administrators legitimately troubleshooting LSASS (rare; verify ticket)
level: high
