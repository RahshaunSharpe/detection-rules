name: coverage

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  navigator-layer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pyyaml

      - name: Generate ATT&CK Navigator layer
        run: python scripts/generate_navigator_layer.py rules/ coverage/navigator_layer.json

      - name: Commit layer
        run: |
          git config user.name "coverage-bot"
          git config user.email "actions@github.com"
          git add coverage/navigator_layer.json
          git diff --cached --quiet || git commit -m "chore: update ATT&CK coverage layer"
          git push
