title: Filter - Exclude Splunk Internal Processes
id: 8bc57024-c842-4432-b147-be90ccc76977
description: |
    Lab tuning: Splunk's own binaries generate process noise on the
    same host as the SIEM. Excluded per SOP Procedure C.
logsource:
    category: process_creation
    product: windows
filter:
    rules:
        - c4e9f0a2-6b8d-4f1c-8a3e-9d7b2c5f4e60   # win_execution_encoded_powershell
    selection:
        Image|startswith: 'C:\Program Files\Splunk\'
    condition: not selection